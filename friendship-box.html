<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friendship Magic Box</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
  body{background:#fff0f5; overflow-x:hidden;}
  .center{display:flex;justify-content:center;align-items:center;flex-direction:column;height:100vh;text-align:center;padding:20px;}
  input[type="password"]{padding:10px 15px;font-size:18px;border-radius:10px;border:1px solid #ff4d6d;}
  button{padding:10px 20px;margin-top:15px;border:none;background:#ff4d6d;color:white;border-radius:10px;font-size:18px;cursor:pointer;transition:0.3s;}
  button:hover{background:#ff8fab;}
  h1{font-family:'Great Vibes',cursive;font-size:50px;color:#ff4d6d;margin-bottom:20px;}
  p{font-size:20px;line-height:1.6;margin:10px 0;}
  
  /* Gift box page */
  #giftBox{font-size:100px;cursor:pointer;animation: bounce 1s infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}
  
  /* Card styles */
  .cards-container{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:20px;margin-top:30px;}
  .card{width:250px;height:150px;background:#ffccd5;border-radius:15px;display:flex;justify-content:center;align-items:center;cursor:pointer;position:relative;perspective:1000px;box-shadow:0 5px 15px rgba(0,0,0,0.2);}
  .inner-card{position:absolute;width:100%;height:100%;transition:transform 0.8s;transform-style:preserve-3d;border-radius:15px;}
  .inner-card.flipped{transform:rotateY(180deg);}
  .front, .back{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;justify-content:center;align-items:center;text-align:center;padding:15px;border-radius:15px;font-size:18px;}
  .front{background:#ff4d6d;color:white;flex-direction:column;}
  .back{background:#ffe4e1;color:#333;transform:rotateY(180deg);flex-direction:column;}
  
  /* Floating emojis */
  .emoji{position:absolute;font-size:25px;animation: floaty 5s linear infinite;}
  @keyframes floaty{0%{transform:translateY(100vh);}100%{transform:translateY(-10vh);}}
</style>
</head>
<body>

<!-- Password Page -->
<div class="center" id="passwordPage">
  <h1>Enter Password 🔒</h1>
  <input type="password" id="passInput" placeholder="Type here">
  <button onclick="checkPassword()">Unlock</button>
</div>

<!-- Gift Box Page -->
<div class="center" id="giftPage" style="display:none;">
  <div id="giftBox">🎁</div>
  <p>Wanna know what's inside the box?</p>
  <button onclick="openBox()">Open It</button>
</div>

<!-- Cards Page -->
<div class="center" id="cardsPage" style="display:none;">
  <div class="cards-container" id="cardsContainer">
    <!-- Cards generated by JS -->
  </div>
</div>

<!-- Floating emojis container -->
<div id="emojiContainer"></div>

<script>
  // Password
  function checkPassword(){
    const pass = document.getElementById('passInput').value.trim();
    if(pass === "chipkli"){
      document.getElementById('passwordPage').style.display="none";
      document.getElementById('giftPage').style.display="flex";
    } else {
      alert("Wrong password! 😅");
    }
  }

  // Open gift box
  function openBox(){
    document.getElementById('giftPage').style.display="none";
    document.getElementById('cardsPage').style.display="flex";
    createCards();
    createEmojis();
  }

  // Card data
  const cardData = [
    {heading:"Tu meri hai kon ?", text:"Apko pta hai aap na meri piyari si wo bhn ho jise mainy had sy ziada piyar kiya or krta hon meri sagi bhn Anum usky sath itni nhi banti thi meri lakin tere sath meri dosti wali feel bhi aayi. U will always be special too me."},
    {heading:"Tu kitni piyari hai ?", text:"Tujhey pta hai tu kitni piyari hai hehehe itni piyari hai ky mujhey bhi sch me nhi pta tu kitni piyari hai hehe i mean meri piyari si bhnaaaa mujhey define nhi krne ata teri khubsurti ko meri bhna tu or aik teri ankhain bhnaaa mashallah kamal"},
    {heading:"Tu meri bhnaa kyun hai ?", text:"Bhnaaaa kyun ky dill tu kisi kisi ko chunta hai na, or mere dill ny apni bhn ky liyay tujhey chuna. Tere sath meri vibe match howi, tune mujhey bhut piyar diya. Tayyab sy bhi ziada, meri batain manti ho, meri dant sunti ho, meri advices ko seriously leti. Naraz ho jaon tu minton me naye naye tareeqon sy mana leti hai tu mujhey."},
    {heading:"Tu meri life me ayi kese ?", text:"Sirf dua ky liyay gift suggestions dene aayi thi or meri zindagi me hi reh gyi. Mainy tujhey kabhi jane hi nhi diya, na jane donga. Tujh me tu mujhey meri choti bhn ka piyar mila. Tu mere itny close hai, ab tu option hi nhi jane ka. Tere pas meri zindagi ky kuch khas chapters me sy aik chapter hai tu."},
    {heading:"Main tujh sy kyun piyar krta ?", text:"Kyun ky tu piyar krne wali chez hai hehehe main tu chahta sb hi tujh sy piyar kren bhnain tu sukh dukh ki sathi hoti hain betiyan rehmat hoti na tu hum bhaiyon ky liyay hamari choti bhnain bhi kisi rehmat sy km nhi lrkiyan tu sari piyari hoti hain kisi ki bhn hoti wo kisi ki beti hoti hain wo or isi trhn tu bhi meri fav hai meri bhn meri chotiiii or main tujh sy be had piyar krta."}
  ];

  let currentCard = 0;

  function createCards(){
    const container = document.getElementById('cardsContainer');
    cardData.forEach((c,i)=>{
      const card = document.createElement('div');
      card.classList.add('card');
      card.dataset.index=i;
      const inner = document.createElement('div');
      inner.classList.add('inner-card');
      inner.innerHTML=`<div class="front"><h3>${c.heading}</h3><p>Click to reveal</p></div>
                       <div class="back"><h3>${c.heading}</h3><p>${c.text}</p></div>`;
      card.appendChild(inner);
      container.appendChild(card);

      card.addEventListener('click',()=>{
        if(i===currentCard){
          inner.classList.add('flipped');
          currentCard++;
        }
      });
    });
  }

  // Floating emojis
  function createEmojis(){
    const emojis=["😂","💖","😎","🌸","✨"];
    const container = document.getElementById('emojiContainer');
    for(let i=0;i<15;i++){
      const span = document.createElement('div');
      span.classList.add('emoji');
      span.style.left=Math.random()*100+"vw";
      span.style.animationDuration=3+Math.random()*4+"s";
      span.innerText=emojis[Math.floor(Math.random()*emojis.length)];
      container.appendChild(span);
    }
  }

</script>

</body>
</html>
